services:
  # ── Backend: FastAPI Web Service ───────────────────────────────────────────
  - type: web
    name: axiom-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set in Render UI
      - key: SERPER_API_KEY
        sync: false # Set in Render UI
      - key: MONGODB_URI
        sync: false # Set in Render UI
      - key: ALLOWED_ORIGINS
        value: https://axiom-web.onrender.com,http://localhost:3000
      - key: LOG_LEVEL
        value: INFO

  # ── Frontend: Next.js Web Service ──────────────────────────────────────────
  - type: web
    name: axiom-web
    env: node
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://axiom-backend.onrender.com
      - key: NODE_VERSION
        value: 20.x
